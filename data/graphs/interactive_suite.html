<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suite interactive · visualisations</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --rail: rgba(255, 255, 255, .08);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 55%, #db2777 100%);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .shell {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }
    .top {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      gap: 0;
      border-bottom: 1px solid var(--rail);
      background: rgba(15, 23, 42, .92);
      backdrop-filter: blur(10px);
    }
    .brand {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 10px 18px 10px 20px;
      border-right: 1px solid var(--rail);
      min-width: 0;
    }
    .brand strong {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .02em;
    }
    .brand span {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .tabs {
      display: flex;
      flex: 1;
      min-width: 0;
      overflow-x: auto;
      scrollbar-width: thin;
    }
    .tab {
      flex: 1 1 0;
      min-width: 160px;
      border: none;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 14px 16px;
      cursor: pointer;
      text-align: left;
      border-left: 1px solid var(--rail);
      transition: color .15s, background .15s;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .tab:first-of-type { border-left: none; }
    .tab:hover {
      color: #f1f5f9;
      background: rgba(255, 255, 255, .04);
    }
    .tab[aria-selected="true"] {
      color: #fff;
      background: rgba(124, 58, 237, .18);
      box-shadow: inset 0 -3px 0 #a78bfa;
    }
    .tab .tab-title { line-height: 1.25; }
    .tab .tab-sub {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      opacity: .95;
    }
    .tab[aria-selected="true"] .tab-sub { color: #cbd5e1; }
    .stage {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #020617;
    }
    .stage iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #fff;
    }
    .stage iframe.active {
      display: block;
    }
    @media (max-width: 720px) {
      .top { flex-direction: column; }
      .brand { border-right: none; border-bottom: 1px solid var(--rail); }
      .tabs { flex-direction: column; }
      .tab {
        border-left: none;
        border-top: 1px solid var(--rail);
        min-width: 0;
      }
      .tab:first-of-type { border-top: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="top" role="banner">
      <div class="brand">
        <strong>Suite interactive</strong>
        <span>Trois visualisations dans une même fenêtre · chargement à la demande</span>
      </div>
      <div class="tabs" role="tablist" aria-label="Choisir une visualisation">
        <button type="button" role="tab" id="tab-country" aria-controls="panel-country" aria-selected="true"
          data-hash="carte-collaborations" data-src="country_collaborations_map.html" data-target="panel-country">
          <span class="tab-title">🌍 Collaborations par pays</span>
          <span class="tab-sub">Carte Folium · liens transnationaux</span>
        </button>
        <button type="button" role="tab" id="tab-network" aria-controls="panel-network" aria-selected="false"
          data-hash="reseau-recherche" data-src="research_network_map_folium.html" data-target="panel-network">
          <span class="tab-title">🌐 Réseau européen</span>
          <span class="tab-sub">Carte Folium · établissements &amp; filtres</span>
        </button>
        <button type="button" role="tab" id="tab-demo" aria-controls="panel-demo" aria-selected="false"
          data-hash="demo-multi-projets" data-src="demo_multi_project_pair.html" data-target="panel-demo">
          <span class="tab-title">🔗 Démo multi-projets</span>
          <span class="tab-sub">Graphe vis-network · CNRS ↔ CEA</span>
        </button>
      </div>
    </header>
    <div class="stage">
      <iframe id="panel-country" class="active" title="Collaborations transnationales par pays"
        src="country_collaborations_map.html"></iframe>
      <iframe id="panel-network" title="Réseau de recherche européen" data-lazy="1"></iframe>
      <iframe id="panel-demo" title="Collaboration multi-projets entre deux organisations" data-lazy="1"></iframe>
    </div>
  </div>
  <script>
    (function () {
      const buttons = Array.from(document.querySelectorAll('[role="tab"]'));
      const iframes = {
        'panel-country': document.getElementById('panel-country'),
        'panel-network': document.getElementById('panel-network'),
        'panel-demo': document.getElementById('panel-demo')
      };
      const hashToId = {};
      buttons.forEach(function (btn) {
        hashToId[btn.dataset.hash] = btn.dataset.target;
      });

      function activate(panelId, opts) {
        opts = opts || {};
        buttons.forEach(function (b) {
          var sel = b.dataset.target === panelId;
          b.setAttribute('aria-selected', sel ? 'true' : 'false');
        });
        Object.keys(iframes).forEach(function (key) {
          var frame = iframes[key];
          var on = key === panelId;
          frame.classList.toggle('active', on);
        });
        var frame = iframes[panelId];
        if (frame.dataset.lazy === '1' && !frame.src) {
          frame.src = buttons.find(function (b) { return b.dataset.target === panelId; }).dataset.src;
        }
        if (!opts.skipHash) {
          var entry = buttons.find(function (b) { return b.dataset.target === panelId; });
          if (entry && entry.dataset.hash) {
            var h = '#' + entry.dataset.hash;
            if (location.hash !== h) history.replaceState(null, '', h);
          }
        }
      }

      buttons.forEach(function (btn) {
        btn.addEventListener('click', function () {
          activate(btn.dataset.target);
        });
      });

      window.addEventListener('hashchange', function () {
        var id = hashToId[location.hash.replace(/^#/, '')];
        if (id) activate(id, { skipHash: true });
      });

      (function syncFromHash() {
        var id = hashToId[location.hash.replace(/^#/, '')];
        if (id && id !== 'panel-country') activate(id, { skipHash: true });
      })();
    })();
  </script>
</body>
</html>
